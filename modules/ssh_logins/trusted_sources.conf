# =============================================================================
# trusted_sources.conf — SSH Login Monitor: trusted sources
#
# Logins from these IPs or CIDR ranges are excluded from monitoring.
# Add your management networks, VPN gateways, jump hosts, etc.
#
# Format (one entry per line):
#   <ip>          — exact IPv4 match,  e.g.  10.0.0.1
#   <ip>/<prefix> — CIDR range,        e.g.  192.168.1.0/24
#
# Lines starting with # and blank lines are ignored.
# =============================================================================

# Loopback
127.0.0.1
::1

# Example — home network:
# 192.168.1.0/24

# Example — VPN gateway:
# 10.8.0.1

# Example — management VLAN:
# 10.0.10.0/24
